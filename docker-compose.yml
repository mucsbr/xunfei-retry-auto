services:
  xunfei-retry-proxy:
    build: .
    container_name: xunfei-retry-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      LISTEN_ADDR: ":8080"
      UPSTREAM_URL: "${UPSTREAM_URL:-https://maas-coding-api.cn-huabei-1.xf-yun.com/anthropic}"
      MAX_RETRIES: "${MAX_RETRIES:-1}"
      RETRY_GROUP_BASE: "${RETRY_GROUP_BASE:-5}"
      RETRY_BACKOFF: "${RETRY_BACKOFF:-500ms}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT:-0}"
      METRICS_DB_PATH: "${METRICS_DB_PATH:-/data/xunfei-retry-proxy.db}"
    volumes:
      - xunfei-retry-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  xunfei-retry-data:
